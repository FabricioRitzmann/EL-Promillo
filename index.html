<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban + Supabase Auth</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-border: rgba(255, 255, 255, 0.7);
        --text: #1d1d1f;
        --muted: #6e6e73;
        --accent: #0071e3;
        --accent-soft: rgba(0, 113, 227, 0.1);
        --danger: #b42318;
        --shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
        --card-shadow: 0 10px 22px rgba(0, 0, 0, 0.09);
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, #ffffff 0%, #f5f5f7 44%),
          radial-gradient(circle at 90% 10%, #e7efff 0%, transparent 38%),
          radial-gradient(circle at 70% 85%, #f0f8ff 0%, transparent 35%),
          var(--bg);
      }

      .app {
        max-width: 1300px;
        margin: 0 auto;
        padding: 2.2rem 1.2rem 2.8rem;
      }

      .hero {
        margin-bottom: 1rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2vw, 2.2rem);
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 0.4rem 0 0;
        color: var(--muted);
      }

      .auth-panel {
        margin-bottom: 1rem;
        padding: 1rem;
        border-radius: var(--radius-lg);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: var(--shadow);
        display: grid;
        gap: 0.75rem;
      }

      .auth-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(180px, 1fr));
        gap: 0.6rem;
      }

      .auth-actions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .auth-status {
        margin: 0;
        color: var(--muted);
        min-height: 1.2rem;
      }

      .auth-status.error {
        color: var(--danger);
      }

      .hidden {
        display: none !important;
      }

      .board {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(3, minmax(260px, 1fr));
      }

      .bucket {
        display: flex;
        flex-direction: column;
        min-height: 68vh;
        padding: 0.9rem;
        border-radius: var(--radius-lg);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(18px) saturate(150%);
        box-shadow: var(--shadow);
      }

      .bucket-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.85rem;
      }

      .bucket-title {
        width: 100%;
        margin: 0;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        padding: 0.45rem 0.55rem;
        border-radius: 10px;
      }

      .bucket-title:focus,
      .input:focus {
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 2px var(--accent-soft);
      }

      .add-card {
        border: none;
        border-radius: 999px;
        width: 2rem;
        height: 2rem;
        color: #fff;
        font-size: 1.2rem;
        line-height: 1;
        cursor: pointer;
        background: linear-gradient(180deg, #2f91ff, #0071e3);
        box-shadow: 0 8px 18px rgba(0, 113, 227, 0.3);
      }

      .cards {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        padding: 0.15rem;
        border-radius: var(--radius-md);
        transition: background-color 160ms ease, outline-color 160ms ease;
        outline: 2px dashed transparent;
        outline-offset: -8px;
      }

      .cards.is-over {
        background: var(--accent-soft);
        outline-color: rgba(0, 113, 227, 0.32);
      }

      .card {
        border-radius: var(--radius-md);
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.04);
        box-shadow: var(--card-shadow);
        padding: 0.85rem 0.9rem;
        cursor: grab;
        user-select: none;
      }

      .card.dragging {
        opacity: 0.45;
        transform: scale(0.98);
      }

      .card-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
      }

      .todo-list {
        margin: 0.55rem 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.45rem;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.92rem;
      }

      .todo-item input {
        accent-color: var(--accent);
      }

      .todo-item span.done {
        color: var(--muted);
        text-decoration: line-through;
      }

      .empty {
        color: var(--muted);
        font-size: 0.92rem;
        border: 1px dashed rgba(0, 0, 0, 0.12);
        border-radius: var(--radius-md);
        padding: 0.8rem;
        text-align: center;
      }

      .input {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 10px;
        padding: 0.6rem 0.7rem;
        font: inherit;
        background: #fff;
      }

      .btn {
        border: none;
        border-radius: 10px;
        font: inherit;
        padding: 0.52rem 0.85rem;
        cursor: pointer;
      }

      .btn-secondary {
        background: #efeff2;
        color: var(--text);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(2px);
        z-index: 50;
      }

      .modal-backdrop.is-open {
        display: grid;
      }

      .modal {
        width: min(560px, 100%);
        border-radius: var(--radius-lg);
        background: #fff;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }

      .modal h2 {
        margin: 0 0 0.7rem;
      }

      .modal-label {
        margin: 0.75rem 0 0.35rem;
        display: block;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .modal-type {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .modal-choice {
        border: 1px solid rgba(0, 113, 227, 0.2);
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
        cursor: pointer;
        background: #fff;
      }

      .todo-draft {
        margin-top: 0.55rem;
        display: grid;
        gap: 0.45rem;
      }

      .todo-draft-item {
        padding: 0.4rem 0.55rem;
        border-radius: 8px;
        background: #f7f7f8;
        font-size: 0.9rem;
      }

      .modal-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      @media (max-width: 980px) {
        .board,
        .auth-grid {
          grid-template-columns: 1fr;
        }

        .bucket {
          min-height: 42vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Kanban Board + Supabase</h1>
        <p>Registrieren/Login mit E-Mail + Passwort, Magic-Link Login und persistentes Board pro User.</p>
      </section>

      <section class="auth-panel">
        <div class="auth-grid">
          <input class="input" id="emailInput" type="email" placeholder="E-Mail" autocomplete="email" />
          <input class="input" id="passwordInput" type="password" placeholder="Passwort" autocomplete="current-password" />
        </div>

        <div class="auth-actions">
          <button class="btn btn-primary" id="registerBtn" type="button">Registrieren</button>
          <button class="btn btn-primary" id="loginBtn" type="button">Login</button>
          <button class="btn btn-secondary" id="magicLinkBtn" type="button">One-Turn-Go Mail Login</button>
          <button class="btn btn-secondary" id="forgotBtn" type="button">Passwort vergessen</button>
          <button class="btn btn-secondary hidden" id="logoutBtn" type="button">Logout</button>
        </div>

        <div class="auth-grid hidden" id="newPasswordRow">
          <input class="input" id="newPasswordInput" type="password" placeholder="Neues Passwort" autocomplete="new-password" />
          <button class="btn btn-primary" id="saveNewPasswordBtn" type="button">Neues Passwort speichern</button>
        </div>

        <p class="auth-status" id="authStatus">Lade Supabase-Konfiguration ...</p>
      </section>

      <section class="board hidden" id="board">
        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="Ideen" aria-label="Bucket 1 Titel" data-title-index="0" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="0"></div>
        </article>

        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="In Arbeit" aria-label="Bucket 2 Titel" data-title-index="1" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="1"></div>
        </article>

        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="Erledigt" aria-label="Bucket 3 Titel" data-title-index="2" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="2"></div>
        </article>
      </section>
    </main>

    <div class="modal-backdrop" id="noteModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Neue Notiz</h2>
        <div class="modal-type">
          <label class="modal-choice"><input type="radio" name="noteType" value="text" checked /> Normale Notiz</label>
          <label class="modal-choice"><input type="radio" name="noteType" value="todo" /> To-Do-Notiz</label>
        </div>

        <label class="modal-label" for="noteTitle">Titel / Text</label>
        <input class="input" id="noteTitle" type="text" placeholder="z. B. Meeting-Notizen" />

        <div id="todoFields" hidden>
          <label class="modal-label" for="todoInput">To-Do hinzufügen</label>
          <div class="modal-type">
            <input class="input" id="todoInput" type="text" placeholder="z. B. E-Mail senden" />
            <button class="btn btn-secondary" id="addTodoItemBtn" type="button">Hinzufügen</button>
          </div>
          <div class="todo-draft" id="todoDraftList"></div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" id="cancelNoteBtn" type="button">Abbrechen</button>
          <button class="btn btn-primary" id="createNoteBtn" type="button">Erstellen</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const DEFAULT_STATE = {
        titles: ["Ideen", "In Arbeit", "Erledigt"],
        columns: [[], [], []],
      };

      const board = document.getElementById("board");
      const noteModal = document.getElementById("noteModal");
      const noteTitleInput = document.getElementById("noteTitle");
      const todoFields = document.getElementById("todoFields");
      const todoInput = document.getElementById("todoInput");
      const addTodoItemBtn = document.getElementById("addTodoItemBtn");
      const todoDraftList = document.getElementById("todoDraftList");
      const cancelNoteBtn = document.getElementById("cancelNoteBtn");
      const createNoteBtn = document.getElementById("createNoteBtn");

      const emailInput = document.getElementById("emailInput");
      const passwordInput = document.getElementById("passwordInput");
      const registerBtn = document.getElementById("registerBtn");
      const loginBtn = document.getElementById("loginBtn");
      const magicLinkBtn = document.getElementById("magicLinkBtn");
      const forgotBtn = document.getElementById("forgotBtn");
      const logoutBtn = document.getElementById("logoutBtn");
      const authStatus = document.getElementById("authStatus");
      const newPasswordRow = document.getElementById("newPasswordRow");
      const newPasswordInput = document.getElementById("newPasswordInput");
      const saveNewPasswordBtn = document.getElementById("saveNewPasswordBtn");

      let supabase;
      let currentUser = null;
      let boardState = structuredClone(DEFAULT_STATE);
      let draggedCardId = null;
      let modalTargetBucket = null;
      let todoDraftItems = [];
      let saveTimer = null;

      function setStatus(message, isError = false) {
        authStatus.textContent = message;
        authStatus.classList.toggle("error", isError);
      }

      function getCredentialsErrorText(error) {
        return `Supabase Config fehlt/ungültig: ${error.message}. Bitte supabase.credentials.json ausfüllen.`;
      }

      async function loadCredentials() {
        try {
          const response = await fetch("./supabase.credentials.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Datei konnte nicht geladen werden (HTTP ${response.status})`);
          }
          const config = await response.json();
          if (!config?.supabaseUrl || !config?.supabaseAnonKey) {
            throw new Error("supabaseUrl oder supabaseAnonKey fehlt");
          }
          return config;
        } catch (error) {
          setStatus(getCredentialsErrorText(error), true);
          throw error;
        }
      }

      function scheduleSave() {
        if (!currentUser) return;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
          saveBoard().catch((error) => setStatus(`Speichern fehlgeschlagen: ${error.message}`, true));
        }, 500);
      }

      function getSelectedType() {
        return document.querySelector('input[name="noteType"]:checked').value;
      }

      function setTypeFields() {
        todoFields.hidden = getSelectedType() !== "todo";
      }

      function renderTodoDraft() {
        todoDraftList.innerHTML = "";
        todoDraftItems.forEach((itemText, index) => {
          const row = document.createElement("div");
          row.className = "todo-draft-item";
          row.textContent = `${index + 1}. ${itemText}`;
          todoDraftList.appendChild(row);
        });
      }

      function addTodoDraftItem() {
        const value = todoInput.value.trim();
        if (!value) return;
        todoDraftItems.push(value);
        todoInput.value = "";
        renderTodoDraft();
      }

      function openNoteModal(bucketIndex) {
        modalTargetBucket = Number(bucketIndex);
        todoDraftItems = [];
        noteTitleInput.value = "";
        todoInput.value = "";
        todoDraftList.innerHTML = "";
        setTypeFields();
        noteModal.classList.add("is-open");
        noteModal.setAttribute("aria-hidden", "false");
        noteTitleInput.focus();
      }

      function closeNoteModal() {
        noteModal.classList.remove("is-open");
        noteModal.setAttribute("aria-hidden", "true");
      }

      function updateBoardTitles() {
        document.querySelectorAll(".bucket-title").forEach((input, index) => {
          input.value = boardState.titles[index] || DEFAULT_STATE.titles[index];
        });
      }

      function findCardPosition(cardId) {
        for (let bucketIndex = 0; bucketIndex < boardState.columns.length; bucketIndex += 1) {
          const cardIndex = boardState.columns[bucketIndex].findIndex((card) => card.id === cardId);
          if (cardIndex >= 0) return { bucketIndex, cardIndex };
        }
        return null;
      }

      function createCardElement(card) {
        const element = document.createElement("div");
        element.className = "card";
        element.draggable = true;
        element.dataset.cardId = card.id;

        if (card.type === "todo") {
          const title = document.createElement("h3");
          title.className = "card-title";
          title.textContent = card.title;
          element.appendChild(title);

          const list = document.createElement("ul");
          list.className = "todo-list";

          card.todos.forEach((todo, todoIndex) => {
            const item = document.createElement("li");
            item.className = "todo-item";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = Boolean(todo.done);
            const label = document.createElement("span");
            label.textContent = todo.text;
            label.classList.toggle("done", checkbox.checked);

            checkbox.addEventListener("change", () => {
              const pos = findCardPosition(card.id);
              if (!pos) return;
              boardState.columns[pos.bucketIndex][pos.cardIndex].todos[todoIndex].done = checkbox.checked;
              label.classList.toggle("done", checkbox.checked);
              scheduleSave();
            });

            item.append(checkbox, label);
            list.appendChild(item);
          });

          element.appendChild(list);
        } else {
          element.textContent = card.title;
        }

        element.addEventListener("dragstart", () => {
          draggedCardId = card.id;
          element.classList.add("dragging");
        });

        element.addEventListener("dragend", () => {
          element.classList.remove("dragging");
          draggedCardId = null;
        });

        return element;
      }

      function renderBoard() {
        updateBoardTitles();

        document.querySelectorAll(".cards").forEach((zone, bucketIndex) => {
          zone.innerHTML = "";
          const cards = boardState.columns[bucketIndex] || [];
          cards.forEach((card) => zone.appendChild(createCardElement(card)));

          if (cards.length === 0) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Keine Karten – mit + neue Karte erstellen.";
            zone.appendChild(empty);
          }
        });
      }

      function moveCard(cardId, toBucket, targetCardId = null) {
        const fromPos = findCardPosition(cardId);
        if (!fromPos) return;

        const [card] = boardState.columns[fromPos.bucketIndex].splice(fromPos.cardIndex, 1);
        const destination = boardState.columns[toBucket];

        if (!targetCardId) {
          destination.push(card);
        } else {
          const targetIndex = destination.findIndex((item) => item.id === targetCardId);
          if (targetIndex < 0) destination.push(card);
          else destination.splice(targetIndex, 0, card);
        }

        renderBoard();
        scheduleSave();
      }

      function getDropTarget(container, mouseY) {
        const cards = [...container.querySelectorAll(".card:not(.dragging)")];
        return cards.reduce(
          (closest, card) => {
            const box = card.getBoundingClientRect();
            const offset = mouseY - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
              return { offset, element: card };
            }
            return closest;
          },
          { offset: Number.NEGATIVE_INFINITY, element: null }
        ).element;
      }

      async function saveBoard() {
        if (!currentUser) return;

        const { error } = await supabase.from("kanban_boards").upsert(
          {
            user_id: currentUser.id,
            board_state: boardState,
            updated_at: new Date().toISOString(),
          },
          { onConflict: "user_id" }
        );

        if (error) throw error;
        setStatus(`Gespeichert für ${currentUser.email}`);
      }

      async function loadBoardForUser(user) {
        const { data, error } = await supabase
          .from("kanban_boards")
          .select("board_state")
          .eq("user_id", user.id)
          .maybeSingle();

        if (error) throw error;

        boardState = data?.board_state
          ? {
              titles: data.board_state.titles || structuredClone(DEFAULT_STATE.titles),
              columns: data.board_state.columns || structuredClone(DEFAULT_STATE.columns),
            }
          : structuredClone(DEFAULT_STATE);

        renderBoard();
      }

      function resetBoardUI() {
        boardState = structuredClone(DEFAULT_STATE);
        renderBoard();
      }

      async function register() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return setStatus("Bitte E-Mail und Passwort eingeben.", true);

        const { error } = await supabase.auth.signUp({ email, password });
        if (error) return setStatus(error.message, true);

        setStatus("Registrierung erfolgreich. Prüfe ggf. dein E-Mail-Postfach für Verifizierung.");
      }

      async function login() {
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        if (!email || !password) return setStatus("Bitte E-Mail und Passwort eingeben.", true);

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) return setStatus(error.message, true);
      }

      async function sendMagicLink() {
        const email = emailInput.value.trim();
        if (!email) return setStatus("Bitte E-Mail eingeben.", true);

        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: { emailRedirectTo: window.location.href },
        });

        if (error) return setStatus(error.message, true);
        setStatus("One-Turn-Go Login-Link wurde per E-Mail versendet.");
      }

      async function forgotPassword() {
        const email = emailInput.value.trim();
        if (!email) return setStatus("Bitte E-Mail eingeben.", true);

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.href,
        });

        if (error) return setStatus(error.message, true);
        setStatus("Passwort-Reset Mail wurde versendet.");
      }

      async function saveNewPassword() {
        const nextPassword = newPasswordInput.value.trim();
        if (!nextPassword) return setStatus("Bitte neues Passwort eingeben.", true);

        const { error } = await supabase.auth.updateUser({ password: nextPassword });
        if (error) return setStatus(error.message, true);

        setStatus("Neues Passwort gespeichert. Du bist jetzt eingeloggt.");
        newPasswordRow.classList.add("hidden");
        newPasswordInput.value = "";
      }

      function updateAuthUI(user) {
        const isLoggedIn = Boolean(user);
        board.classList.toggle("hidden", !isLoggedIn);
        logoutBtn.classList.toggle("hidden", !isLoggedIn);
        currentUser = user;

        if (isLoggedIn) {
          setStatus(`Angemeldet als ${user.email}`);
          loadBoardForUser(user).catch((error) => setStatus(`Board-Laden fehlgeschlagen: ${error.message}`, true));
        } else {
          setStatus("Bitte einloggen oder registrieren.");
          resetBoardUI();
        }
      }

      function attachBoardEvents() {
        board.querySelectorAll(".bucket").forEach((bucket) => {
          const addButton = bucket.querySelector(".add-card");
          const cardsZone = bucket.querySelector(".cards");
          const bucketIndex = Number(cardsZone.dataset.bucket);

          addButton.addEventListener("click", () => openNoteModal(bucketIndex));

          cardsZone.addEventListener("dragover", (event) => {
            event.preventDefault();
            cardsZone.classList.add("is-over");
          });

          cardsZone.addEventListener("dragleave", () => cardsZone.classList.remove("is-over"));

          cardsZone.addEventListener("drop", (event) => {
            event.preventDefault();
            cardsZone.classList.remove("is-over");
            if (!draggedCardId) return;

            const afterElement = getDropTarget(cardsZone, event.clientY);
            moveCard(draggedCardId, bucketIndex, afterElement?.dataset.cardId || null);
          });
        });

        document.querySelectorAll(".bucket-title").forEach((input, index) => {
          input.addEventListener("change", () => {
            boardState.titles[index] = input.value.trim() || DEFAULT_STATE.titles[index];
            renderBoard();
            scheduleSave();
          });
        });
      }

      function attachModalEvents() {
        document.querySelectorAll('input[name="noteType"]').forEach((radio) => {
          radio.addEventListener("change", setTypeFields);
        });

        addTodoItemBtn.addEventListener("click", addTodoDraftItem);
        todoInput.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            addTodoDraftItem();
          }
        });

        cancelNoteBtn.addEventListener("click", closeNoteModal);

        noteModal.addEventListener("click", (event) => {
          if (event.target === noteModal) closeNoteModal();
        });

        createNoteBtn.addEventListener("click", () => {
          const title = noteTitleInput.value.trim();
          const type = getSelectedType();
          if (!title || modalTargetBucket === null) return;
          if (type === "todo" && todoDraftItems.length === 0) {
            window.alert("Bitte mindestens ein To-Do hinzufügen.");
            return;
          }

          const card = {
            id: crypto.randomUUID(),
            type,
            title,
            todos: type === "todo" ? todoDraftItems.map((text) => ({ text, done: false })) : [],
          };

          boardState.columns[modalTargetBucket].push(card);
          renderBoard();
          scheduleSave();
          closeNoteModal();
        });
      }

      function attachAuthEvents() {
        registerBtn.addEventListener("click", () => register().catch((error) => setStatus(error.message, true)));
        loginBtn.addEventListener("click", () => login().catch((error) => setStatus(error.message, true)));
        magicLinkBtn.addEventListener("click", () => sendMagicLink().catch((error) => setStatus(error.message, true)));
        forgotBtn.addEventListener("click", () => forgotPassword().catch((error) => setStatus(error.message, true)));
        saveNewPasswordBtn.addEventListener("click", () => saveNewPassword().catch((error) => setStatus(error.message, true)));
        logoutBtn.addEventListener("click", async () => {
          const { error } = await supabase.auth.signOut();
          if (error) return setStatus(error.message, true);
        });
      }

      async function bootstrap() {
        attachBoardEvents();
        attachModalEvents();
        attachAuthEvents();
        renderBoard();

        const credentials = await loadCredentials();
        supabase = createClient(credentials.supabaseUrl, credentials.supabaseAnonKey);

        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;
        updateAuthUI(data.session?.user || null);

        supabase.auth.onAuthStateChange((event, session) => {
          if (event === "PASSWORD_RECOVERY") {
            newPasswordRow.classList.remove("hidden");
            setStatus("Recovery erkannt: Bitte neues Passwort setzen.");
          }
          updateAuthUI(session?.user || null);
        });
      }

      bootstrap().catch((error) => {
        setStatus(`Initialisierung fehlgeschlagen: ${error.message}`, true);
      });
    </script>
  </body>
</html>
