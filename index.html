<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple-Style Kanban</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-border: rgba(255, 255, 255, 0.7);
        --text: #1d1d1f;
        --muted: #6e6e73;
        --accent: #0071e3;
        --accent-soft: rgba(0, 113, 227, 0.1);
        --shadow: 0 16px 35px rgba(0, 0, 0, 0.08);
        --card-shadow: 0 10px 22px rgba(0, 0, 0, 0.09);
        --radius-lg: 20px;
        --radius-md: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 20%, #ffffff 0%, #f5f5f7 44%),
          radial-gradient(circle at 90% 10%, #e7efff 0%, transparent 38%),
          radial-gradient(circle at 70% 85%, #f0f8ff 0%, transparent 35%),
          var(--bg);
      }

      .app {
        max-width: 1300px;
        margin: 0 auto;
        padding: 2.2rem 1.2rem 2.8rem;
      }

      .hero {
        margin-bottom: 1.5rem;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(1.6rem, 2vw, 2.2rem);
        letter-spacing: -0.02em;
      }

      .hero p {
        margin: 0.4rem 0 0;
        color: var(--muted);
      }

      .board {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(3, minmax(260px, 1fr));
      }

      .bucket {
        display: flex;
        flex-direction: column;
        min-height: 70vh;
        padding: 0.9rem;
        border-radius: var(--radius-lg);
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(18px) saturate(150%);
        box-shadow: var(--shadow);
      }

      .bucket-header {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.85rem;
      }

      .bucket-title {
        width: 100%;
        margin: 0;
        border: none;
        background: transparent;
        color: var(--text);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        padding: 0.45rem 0.55rem;
        border-radius: 10px;
      }

      .bucket-title:focus {
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 2px var(--accent-soft);
      }

      .add-card {
        border: none;
        border-radius: 999px;
        width: 2rem;
        height: 2rem;
        color: #fff;
        font-size: 1.2rem;
        line-height: 1;
        cursor: pointer;
        background: linear-gradient(180deg, #2f91ff, #0071e3);
        box-shadow: 0 8px 18px rgba(0, 113, 227, 0.3);
      }

      .add-card:hover {
        transform: translateY(-1px);
      }

      .cards {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        padding: 0.15rem;
        border-radius: var(--radius-md);
        transition: background-color 160ms ease, outline-color 160ms ease;
        outline: 2px dashed transparent;
        outline-offset: -8px;
      }

      .cards.is-over {
        background: var(--accent-soft);
        outline-color: rgba(0, 113, 227, 0.32);
      }

      .card {
        border-radius: var(--radius-md);
        background: #fff;
        border: 1px solid rgba(0, 0, 0, 0.04);
        box-shadow: var(--card-shadow);
        padding: 0.85rem 0.9rem;
        cursor: grab;
        user-select: none;
      }

      .card:active {
        cursor: grabbing;
      }

      .card.dragging {
        opacity: 0.45;
        transform: scale(0.98);
      }

      .card-title {
        margin: 0;
        font-size: 0.98rem;
        font-weight: 600;
      }

      .todo-list {
        margin: 0.55rem 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.45rem;
      }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        font-size: 0.92rem;
        color: var(--text);
      }

      .todo-item input {
        accent-color: var(--accent);
      }

      .todo-item span.done {
        color: var(--muted);
        text-decoration: line-through;
      }

      .empty {
        color: var(--muted);
        font-size: 0.92rem;
        border: 1px dashed rgba(0, 0, 0, 0.12);
        border-radius: var(--radius-md);
        padding: 0.8rem;
        text-align: center;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(2px);
        z-index: 50;
      }

      .modal-backdrop.is-open {
        display: grid;
      }

      .modal {
        width: min(560px, 100%);
        border-radius: var(--radius-lg);
        background: #fff;
        box-shadow: var(--shadow);
        padding: 1.1rem;
      }

      .modal h2 {
        margin: 0 0 0.7rem;
      }

      .modal-label {
        margin: 0.75rem 0 0.35rem;
        display: block;
        font-size: 0.92rem;
        color: var(--muted);
      }

      .modal-input {
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.15);
        border-radius: 10px;
        padding: 0.6rem 0.7rem;
        font: inherit;
      }

      .modal-type {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .modal-choice {
        border: 1px solid rgba(0, 113, 227, 0.2);
        border-radius: 999px;
        padding: 0.45rem 0.8rem;
        cursor: pointer;
        background: #fff;
      }

      .modal-choice input {
        margin-right: 0.4rem;
      }

      .todo-draft {
        margin-top: 0.55rem;
        display: grid;
        gap: 0.45rem;
      }

      .todo-draft-item {
        padding: 0.4rem 0.55rem;
        border-radius: 8px;
        background: #f7f7f8;
        font-size: 0.9rem;
      }

      .modal-actions {
        margin-top: 1rem;
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .btn {
        border: none;
        border-radius: 10px;
        font: inherit;
        padding: 0.52rem 0.85rem;
        cursor: pointer;
      }

      .btn-secondary {
        background: #efeff2;
        color: var(--text);
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      @media (max-width: 980px) {
        .board {
          grid-template-columns: 1fr;
        }

        .bucket {
          min-height: 45vh;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Kanban Board</h1>
        <p>Bucket-Titel frei bearbeiten, Karten erstellen und per Drag &amp; Drop verschieben.</p>
      </section>

      <section class="board" id="board">
        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="Ideen" aria-label="Bucket 1 Titel" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="0"></div>
        </article>

        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="In Arbeit" aria-label="Bucket 2 Titel" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="1"></div>
        </article>

        <article class="bucket">
          <header class="bucket-header">
            <input class="bucket-title" type="text" value="Erledigt" aria-label="Bucket 3 Titel" />
            <button class="add-card" type="button" aria-label="Karte hinzufügen">+</button>
          </header>
          <div class="cards" data-bucket="2"></div>
        </article>
      </section>
    </main>
    <div class="modal-backdrop" id="noteModal" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <h2 id="modalTitle">Neue Notiz</h2>
        <div class="modal-type">
          <label class="modal-choice">
            <input type="radio" name="noteType" value="text" checked />
            Normale Notiz
          </label>
          <label class="modal-choice">
            <input type="radio" name="noteType" value="todo" />
            To-Do-Notiz
          </label>
        </div>
        <label class="modal-label" for="noteTitle">Titel / Text</label>
        <input class="modal-input" id="noteTitle" type="text" placeholder="z. B. Meeting-Notizen" />

        <div id="todoFields" hidden>
          <label class="modal-label" for="todoInput">To-Do hinzufügen</label>
          <div class="modal-type">
            <input class="modal-input" id="todoInput" type="text" placeholder="z. B. E-Mail senden" />
            <button class="btn btn-secondary" id="addTodoItemBtn" type="button">Hinzufügen</button>
          </div>
          <div class="todo-draft" id="todoDraftList"></div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" id="cancelNoteBtn" type="button">Abbrechen</button>
          <button class="btn btn-primary" id="createNoteBtn" type="button">Erstellen</button>
        </div>
      </div>
    </div>

    <script>
      const board = document.getElementById("board");
      const noteModal = document.getElementById("noteModal");
      const noteTitleInput = document.getElementById("noteTitle");
      const todoFields = document.getElementById("todoFields");
      const todoInput = document.getElementById("todoInput");
      const addTodoItemBtn = document.getElementById("addTodoItemBtn");
      const todoDraftList = document.getElementById("todoDraftList");
      const cancelNoteBtn = document.getElementById("cancelNoteBtn");
      const createNoteBtn = document.getElementById("createNoteBtn");
      let draggedCard = null;
      let targetZone = null;
      let todoDraftItems = [];

      function createCard(note) {
        const card = document.createElement("div");
        card.className = "card";
        card.draggable = true;
        if (note.type === "todo") {
          const title = document.createElement("h3");
          title.className = "card-title";
          title.textContent = note.title;
          card.appendChild(title);

          const list = document.createElement("ul");
          list.className = "todo-list";
          note.todos.forEach((todoText) => {
            const item = document.createElement("li");
            item.className = "todo-item";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            const label = document.createElement("span");
            label.textContent = todoText;

            checkbox.addEventListener("change", () => {
              label.classList.toggle("done", checkbox.checked);
            });

            item.append(checkbox, label);
            list.appendChild(item);
          });
          card.appendChild(list);
        } else {
          card.textContent = note.title;
        }

        card.addEventListener("dragstart", () => {
          draggedCard = card;
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
          draggedCard = null;
          renderEmptyStates();
        });

        return card;
      }

      function openNoteModal(zone) {
        targetZone = zone;
        todoDraftItems = [];
        noteTitleInput.value = "";
        todoInput.value = "";
        todoDraftList.innerHTML = "";
        noteModal.classList.add("is-open");
        noteModal.setAttribute("aria-hidden", "false");
        setTypeFields();
        noteTitleInput.focus();
      }

      function closeNoteModal() {
        noteModal.classList.remove("is-open");
        noteModal.setAttribute("aria-hidden", "true");
      }

      function getSelectedType() {
        return document.querySelector('input[name="noteType"]:checked').value;
      }

      function setTypeFields() {
        todoFields.hidden = getSelectedType() !== "todo";
      }

      function renderTodoDraft() {
        todoDraftList.innerHTML = "";
        todoDraftItems.forEach((itemText, index) => {
          const row = document.createElement("div");
          row.className = "todo-draft-item";
          row.textContent = `${index + 1}. ${itemText}`;
          todoDraftList.appendChild(row);
        });
      }

      function addTodoDraftItem() {
        const value = todoInput.value.trim();
        if (!value) return;
        todoDraftItems.push(value);
        todoInput.value = "";
        renderTodoDraft();
        todoInput.focus();
      }

      function renderEmptyStates() {
        document.querySelectorAll(".cards").forEach((zone) => {
          const hasCard = zone.querySelector(".card");
          const hint = zone.querySelector(".empty");

          if (!hasCard && !hint) {
            const empty = document.createElement("div");
            empty.className = "empty";
            empty.textContent = "Keine Karten – mit + neue Karte erstellen.";
            zone.appendChild(empty);
          }

          if (hasCard && hint) {
            hint.remove();
          }
        });
      }

      board.querySelectorAll(".bucket").forEach((bucket) => {
        const addButton = bucket.querySelector(".add-card");
        const cardsZone = bucket.querySelector(".cards");

        addButton.addEventListener("click", () => {
          openNoteModal(cardsZone);
        });

        cardsZone.addEventListener("dragover", (event) => {
          event.preventDefault();
          cardsZone.classList.add("is-over");
        });

        cardsZone.addEventListener("dragleave", () => {
          cardsZone.classList.remove("is-over");
        });

        cardsZone.addEventListener("drop", (event) => {
          event.preventDefault();
          cardsZone.classList.remove("is-over");
          if (!draggedCard) {
            return;
          }

          const afterElement = getDropTarget(cardsZone, event.clientY);
          if (afterElement) {
            cardsZone.insertBefore(draggedCard, afterElement);
          } else {
            cardsZone.appendChild(draggedCard);
          }
          renderEmptyStates();
        });
      });

      document.querySelectorAll('input[name="noteType"]').forEach((radio) => {
        radio.addEventListener("change", setTypeFields);
      });

      addTodoItemBtn.addEventListener("click", addTodoDraftItem);
      todoInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          addTodoDraftItem();
        }
      });

      cancelNoteBtn.addEventListener("click", closeNoteModal);
      noteModal.addEventListener("click", (event) => {
        if (event.target === noteModal) {
          closeNoteModal();
        }
      });

      createNoteBtn.addEventListener("click", () => {
        const type = getSelectedType();
        const title = noteTitleInput.value.trim();
        if (!title || !targetZone) return;

        if (type === "todo" && todoDraftItems.length === 0) {
          window.alert("Bitte mindestens ein To-Do hinzufügen.");
          return;
        }

        targetZone.appendChild(
          createCard({
            type,
            title,
            todos: [...todoDraftItems],
          })
        );
        closeNoteModal();
        renderEmptyStates();
      });

      function getDropTarget(container, mouseY) {
        const cards = [...container.querySelectorAll(".card:not(.dragging)")];
        return cards.reduce(
          (closest, card) => {
            const box = card.getBoundingClientRect();
            const offset = mouseY - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
              return { offset, element: card };
            }
            return closest;
          },
          { offset: Number.NEGATIVE_INFINITY, element: null }
        ).element;
      }

      renderEmptyStates();
    </script>
  </body>
</html>
