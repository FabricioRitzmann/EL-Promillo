<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Pass Studio</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <header class="top-bar">
      <h1>Wallet Pass Studio</h1>
      <p>Erstelle Wallet-Karten im Stil von PassKit Templates.</p>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <h2>Pass erstellen</h2>

        <form id="pass-form">
          <div class="form-group">
            <label for="pass-name">Name</label>
            <input id="pass-name" name="name" type="text" required placeholder="z. B. VIP Ticket" />
          </div>

          <div class="form-group">
            <label for="pass-template">Template</label>
            <select id="pass-template" name="template" required>
              <option value="generic">Generic</option>
              <option value="boardingPass">Boarding Pass</option>
              <option value="eventTicket">Event Ticket</option>
              <option value="coupon">Coupon</option>
              <option value="storeCard">Store Card</option>
            </select>
          </div>

          <div class="form-group">
            <label for="organization-name">Organisation</label>
            <input id="organization-name" name="organizationName" type="text" required placeholder="Meine Firma" />
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="background-color">Hintergrundfarbe</label>
              <input id="background-color" name="backgroundColor" type="color" value="#0f172a" />
            </div>
            <div class="form-group">
              <label for="foreground-color">Textfarbe</label>
              <input id="foreground-color" name="foregroundColor" type="color" value="#f8fafc" />
            </div>
          </div>

          <div class="form-grid">
            <div class="form-group">
              <label for="label-color">Label-Farbe</label>
              <input id="label-color" name="labelColor" type="color" value="#94a3b8" />
            </div>
            <div class="form-group">
              <label for="barcode-message">Barcode-Text</label>
              <input id="barcode-message" name="barcodeMessage" type="text" placeholder="ABC-12345" />
            </div>
          </div>

          <div class="form-group">
            <label for="description">Beschreibung</label>
            <textarea id="description" name="description" rows="2" placeholder="Kurze Beschreibung für den Pass"></textarea>
          </div>

          <h3>Template-Felder</h3>
          <div id="template-fields" class="dynamic-fields"></div>

          <div class="button-row">
            <button type="submit" class="btn btn-primary">Speichern</button>
            <button type="button" id="export-json" class="btn">Pass JSON exportieren</button>
          </div>
        </form>
      </section>

      <section class="panel preview-panel">
        <h2>Live Vorschau</h2>
        <article id="pass-preview" class="pass-card">
          <div class="pass-header">
            <p class="pass-label">Organisation</p>
            <p class="pass-value" id="preview-org">Meine Firma</p>
          </div>
          <div class="pass-body">
            <h3 id="preview-name">Neuer Pass</h3>
            <p id="preview-description">Hier erscheint deine Beschreibung.</p>
            <div id="preview-template-fields" class="preview-fields"></div>
          </div>
          <div class="pass-footer">
            <small id="preview-barcode">Barcode: –</small>
          </div>
        </article>
      </section>

      <section class="panel list-panel">
        <h2>Gespeicherte Pässe</h2>
        <ul id="pass-list" class="pass-list"></ul>
      </section>
    </main>

    <template id="field-template">
      <div class="form-group">
        <label></label>
        <input type="text" />
      </div>
    </template>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
